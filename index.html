<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seafarer Nav v4.2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Hamburger Menu Style */
        .panel { position: absolute; background: rgba(20, 30, 48, 0.95); padding: 12px; border-radius: 8px; z-index: 1000; border: 1px solid #5bc0be; transition: all 0.3s ease; }
        #planner-panel { top: 10px; right: 10px; width: 240px; }
        #planner-panel.minimized { width: 44px; height: 44px; padding: 0; overflow: hidden; border-radius: 4px; }
        
        .hamburger-icon { display: none; width: 44px; height: 44px; line-height: 44px; text-align: center; font-size: 24px; cursor: pointer; background: #3a506b; color: white; }
        #planner-panel.minimized .hamburger-icon { display: block; }
        #planner-panel.minimized .panel-content { display: none; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5bc0be; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; }
        .close-btn { cursor: pointer; font-size: 20px; padding: 0 5px; }

        #monitor-bar { bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; display: none; justify-content: space-around; text-align: center; }
        .monitor-item { flex: 1; border-right: 1px solid #3a506b; }
        .monitor-item:last-child { border-right: none; }
        .val { font-size: 20px; font-weight: bold; color: #5bc0be; display: block; }
        .label { font-size: 10px; text-transform: uppercase; color: #a1a1aa; }
        
        .btn { display: block; width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; background: #3a506b; color: white; }
        .btn-start { background: #ff9f1c; color: #0b132b; }
        .vector-popup { color: black; line-height: 1.6; min-width: 180px; }
        input[type="number"] { width: 60px; padding: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="planner-panel" class="panel">
        <div class="hamburger-icon" onclick="toggleMenu()">☰</div>
        <div class="panel-content">
            <div class="panel-header">
                <span>Seafarer Nav v4.2</span>
                <span class="close-btn" onclick="toggleMenu()">×</span>
            </div>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="saveRouteRTZ()">💾 Opslaan</button>
                <button class="btn" onclick="document.getElementById('rtz-upload').click()">📂 Laden</button>
                <input type="file" id="rtz-upload" accept=".rtz, .voy, .zip" style="display:none;" onchange="loadRouteRTZ(event)">
            </div>
            <button class="btn" style="background:#4caf50;" onclick="nextActiveWP()">⏭️ Skip WP</button>
            <button class="btn" style="background:#555;" onclick="clearRoute()">🗑️ Wis Route</button>
            
            <select id="layerSelect" class="btn" onchange="changeLayer(this.value)">
                <option value="onc">Kaart: OpenNautical</option>
                <option value="sat">Kaart: Satelliet</option>
            </select>
            <button class="btn btn-start" id="monitorBtn" onclick="toggleMonitoring()">📡 START MONITORING</button>
        </div>
    </div>

    <div id="monitor-bar" class="panel">
        <div class="monitor-item"><span class="label">SOG (avg)</span><span class="val" id="sog">0.0 kn</span></div>
        <div class="monitor-item"><span class="label">COG</span><span class="val" id="cog">000°</span></div>
        <div class="monitor-item"><span class="label">Actief</span><span class="val" id="wp-info">--</span></div>
        <div class="monitor-item"><span class="label">ETA (End)</span><span class="val" id="eta">--:--</span></div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false, center: [53.9, 9.15], zoom: 11 });
        var waypoints = [], routeLines = [], wpMarkers = [];
        var activeWpIndex = 0, vectorMinutes = 6;
        var shipPos = null, vectorLine = null, shipCircle = null;
        var isMonitoring = false, watchId = null;
        
        // Gemiddelde snelheid variabelen (10 metingen)
        var speedHistory = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playArrivalBeep() { 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const b = (f, d, t) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = f; g.gain.value = 0.1;
                o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + d);
            };
            b(880, 0.1, 0); b(880, 0.1, 0.2);
        }

        function toggleMenu() { document.getElementById('planner-panel').classList.toggle('minimized'); }

        function toggleMonitoring() {
            if (!isMonitoring) {
                isMonitoring = true;
                document.getElementById('monitorBtn').innerText = "🛑 STOP MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff4d4d";
                document.getElementById('monitor-bar').style.display = "flex";
                watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
            } else { location.reload(); }
        }

        function updatePosition(pos) {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const rawSog = (pos.coords.speed * 1.94384) || 0;
            const cog = pos.coords.heading || 0;
            shipPos = [lat, lon];

            // 10-seconden gemiddelde berekenen
            speedHistory.push(rawSog);
            if (speedHistory.length > 10) speedHistory.shift();
            const avgSog = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;

            document.getElementById('sog').innerText = avgSog.toFixed(1) + " kn";
            document.getElementById('cog').innerText = Math.round(cog).toString().padStart(3, '0') + "°";
            
            updateShipGraphics(lat, lon, cog, avgSog);
            
            if (waypoints.length > 0) {
                checkAllBisectors(lat, lon);
                calculateETA(lat, lon, avgSog);
            }
        }

        function updateShipGraphics(lat, lon, cog, sog) {
            // Zwarte Ring
            if (!shipCircle) {
                shipCircle = L.circleMarker([lat, lon], { radius: 10, color: '#000000', weight: 3, fillOpacity: 0 }).addTo(map);
            } else { shipCircle.setLatLng([lat, lon]); }

            // Zwarte Vector
            const dist = (sog * (vectorMinutes / 60));
            const dest = calculateDestination(lat, lon, cog, dist);
            if (!vectorLine) {
                vectorLine = L.polyline([[lat, lon], dest], {color: '#000000', weight: 3}).addTo(map);
            } else { vectorLine.setLatLngs([[lat, lon], dest]); }

            if (!shipCircle.isPopupOpen()) {
                const latD = Math.floor(Math.abs(lat)), latM = ((Math.abs(lat) - latD) * 60).toFixed(3);
                const lonD = Math.floor(Math.abs(lon)), lonM = ((Math.abs(lon) - lonD) * 60).toFixed(3);
                shipCircle.bindPopup(`
                    <div class="vector-popup">
                        <b>Positie:</b><br>${latD}°${latM}'${lat>=0?'N':'S'} ${lonD}°${lonM}'${lon>=0?'E':'W'}<br>
                        <b>SOG:</b> ${sog.toFixed(1)} kn (avg)<br>
                        Vector (min): <input type="number" value="${vectorMinutes}" onchange="vectorMinutes=this.value">
                    </div>
                `, { autoPan: false });
                map.panTo([lat, lon], { animate: false });
            }
        }

        function checkAllBisectors(lat, lon) {
            let changed = false;
            while (activeWpIndex < waypoints.length - 1) {
                const pPrev = (activeWpIndex === 0 && shipPos) ? shipPos : [waypoints[activeWpIndex-1].lat, waypoints[activeWpIndex-1].lng];
                const pCurr = [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng];
                const pNext = [waypoints[activeWpIndex+1].lat, waypoints[activeWpIndex+1].lng];

                if (isPassedBisector(lat, lon, pPrev, pCurr, pNext)) {
                    activeWpIndex++;
                    changed = true;
                    playArrivalBeep();
                } else { break; }
            }
            if (changed) updateRouteDisplay();
        }

        function isPassedBisector(lat, lon, p1, p2, p3) {
            const b1 = getBearing(p1[0], p1[1], p2[0], p2[1]);
            const b2 = getBearing(p2[0], p2[1], p3[0], p3[1]);
            let bisect = (b1 + b2) / 2 + 90;
            const bearingToShip = getBearing(p2[0], p2[1], lat, lon);
            let diff = Math.abs(((bearingToShip - bisect + 180 + 360) % 360) - 180);
            
            // Afstand marge 0.5 NM en hoek-check
            const distToWp = map.distance([lat, lon], p2) / 1852;
            return (distToWp < 0.5 && diff > 90);
        }

        function calculateETA(lat, lon, sog) {
            if (waypoints.length === 0 || activeWpIndex >= waypoints.length || sog < 0.5) {
                document.getElementById('eta').innerText = "--:--"; return;
            }
            let d = map.distance([lat, lon], [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]);
            for (let i = activeWpIndex; i < waypoints.length - 1; i++) {
                d += map.distance([waypoints[i].lat, waypoints[i].lng], [waypoints[i+1].lat, waypoints[i+1].lng]);
            }
            const hours = (d / 1852) / sog;
            const eta = new Date(Date.now() + hours * 3600000);
            document.getElementById('eta').innerText = eta.getHours().toString().padStart(2, '0') + ":" + eta.getMinutes().toString().padStart(2, '0');
            document.getElementById('wp-info').innerText = `WP ${activeWpIndex + 1}`;
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function calculateDestination(lat, lon, brng, dist) {
            const R = 3440.065; const ad = dist / R;
            const la1 = lat * Math.PI / 180; const lo1 = lon * Math.PI / 180; const br = brng * Math.PI / 180;
            const la2 = Math.asin(Math.sin(la1) * Math.cos(ad) + Math.cos(la1) * Math.sin(ad) * Math.cos(br));
            const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(ad) * Math.cos(la1), Math.cos(ad) - Math.sin(la1) * Math.sin(la2));
            return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
        }

        window.loadRouteRTZ = async function(e) {
            const file = e.target.files[0]; if (!file) return;
            let text = "";
            if (file.name.endsWith('.voy')) {
                const zip = new JSZip(); const c = await zip.loadAsync(file);
                const r = Object.keys(c.files).find(n => n.endsWith('.rtz'));
                text = await c.files[r].async("text");
            } else { text = await file.text(); }
            const parser = new DOMParser(); const xml = parser.parseFromString(text, "text/xml");
            const wps = xml.getElementsByTagName("waypoint");
            waypoints = []; activeWpIndex = 0;
            for (let i = 0; i < wps.length; i++) {
                const pos = wps[i].getElementsByTagName("position")[0];
                waypoints.push({lat: parseFloat(pos.getAttribute("lat")), lng: parseFloat(pos.getAttribute("lon"))});
            }
            updateRouteDisplay();
            
            // Na laden direct naar juiste plek focussen
            if (shipPos) map.panTo(shipPos);
            else if (waypoints.length > 0) map.panTo([waypoints[0].lat, waypoints[0].lng]);
        };

        function updateRouteDisplay() {
            routeLines.forEach(l => map.removeLayer(l)); wpMarkers.forEach(m => map.removeLayer(m));
            routeLines = []; wpMarkers = [];
            waypoints.forEach((wp, i) => {
                const color = (i < activeWpIndex) ? '#555' : (i === activeWpIndex ? '#ff9f1c' : 'red');
                const m = L.circleMarker([wp.lat, wp.lng], {radius: 5, color: color}).addTo(map);
                m.bindPopup(`WP ${i+1}<br><button onclick="activeWpIndex=${i}; updateRouteDisplay();">📍 Activeer</button>`);
                wpMarkers.push(m);
                if (i < waypoints.length - 1) {
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: color, weight: 3}).addTo(map);
                    routeLines.push(l);
                }
            });
        }

        window.nextActiveWP = function() { activeWpIndex++; updateRouteDisplay(); };
        window.clearRoute = function() { waypoints = []; activeWpIndex = 0; updateRouteDisplay(); };
        function changeLayer(v) { if(v==='sat') L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map); else location.reload(); }
    </script>
</body>
</html>
