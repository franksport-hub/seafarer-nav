<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seafarer Nav v3.3</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="image_0.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; cursor: crosshair; }
        .panel { position: absolute; background: rgba(20, 30, 48, 0.95); padding: 12px; border-radius: 8px; z-index: 1000; border: 1px solid #5bc0be; transition: all 0.3s ease; }
        #planner-panel { top: 10px; right: 10px; width: 260px; }
        #planner-panel.minimized { height: 35px; width: 180px; overflow: hidden; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5bc0be; margin-bottom: 10px; cursor: pointer; }
        #monitor-bar { bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 700px; display: none; justify-content: space-around; border: 2px solid #5bc0be; text-align: center; }
        .monitor-item { flex: 1; border-right: 1px solid #3a506b; padding: 5px; }
        .monitor-item:last-child { border-right: none; }
        .val { font-size: 18px; font-weight: bold; color: #5bc0be; display: block; }
        .label { font-size: 9px; text-transform: uppercase; color: #a1a1aa; }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-plan { background: #4caf50; color: white; }
        .btn-monitor { background: #ff9f1c; color: #0b132b; }
        .btn-del { background: #ff4d4d; color: white; margin-top: 8px; }
        select { width: 100%; padding: 6px; margin-bottom: 5px; border-radius: 4px; border: none; background: #1c2541; color: white; font-size: 11px; }
        .wp-popup { color: #000; min-width: 170px; font-size: 12px; }
        textarea { width: 90%; height: 40px; padding: 5px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 11px; }
        .wake-status { font-size: 9px; color: #5bc0be; text-align: center; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="planner-panel" class="panel">
        <div class="panel-header" onclick="togglePanel()">
            <span style="font-size:14px; font-weight:bold;">Seafarer Nav v3.3</span>
            <span id="min-icon">_</span>
        </div>
        <div id="panel-content">
            <button class="btn btn-plan" onclick="planSmartRoute()">🗺️ Smart Route (Demo)</button>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button class="btn" style="flex:1; background:#3a506b; color:white;" onclick="saveRouteByName()">💾 Opslaan</button>
                <button class="btn" style="flex:1; background:#3a506b; color:white;" onclick="loadRouteByName()">📂 Laden</button>
            </div>
            <button class="btn" style="background:#555; color:white;" onclick="clearRoute()">🗑️ Wis Route</button>

            <label class="label" style="display:block; margin-top:10px;">Kaartlagen</label>
            <select id="layerSelect" onchange="changeLayer(this.value)">
                <option value="onc">OpenNauticalChart (Full)</option>
                <option value="nautical">ArcGIS + Seamarks</option>
                <option value="sat">Satellite View</option>
            </select>

            <button class="btn btn-monitor" id="monitorBtn" onclick="toggleMonitoring()" style="margin-top:10px;">📡 Start Monitoring</button>
            <div id="wake-info" class="wake-status">Scherm: Normaal</div>
            <button class="btn" style="background:#5bc0be; color:#0b132b;" onclick="exportToRTZ()">📥 Exporteer .RTZ</button>
        </div>
    </div>

    <div id="monitor-bar" class="panel">
        <div class="monitor-item"><span class="label">SOG</span><span class="val" id="sog">0.0 kn</span></div>
        <div class="monitor-item"><span class="label">COG</span><span class="val" id="cog">000°</span></div>
        <div class="monitor-item"><span class="label">HDG</span><span class="val" id="hdg">---°</span></div>
        <div class="monitor-item"><span class="label">TO WP1</span><span class="val" id="next-wp">-- NM</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- PWA SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW mislukt', err));
        }

        // --- WAKE LOCK (Scherm Actief Houden) ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wake-info').innerText = "Scherm: Altijd Actief ✅";
                wakeLock.addEventListener('release', () => {
                    document.getElementById('wake-info').innerText = "Scherm: Normaal";
                });
            } catch (err) {
                document.getElementById('wake-info').innerText = "Scherm: Lock mislukt";
            }
        }

        // --- BASIS KAART & VARIABELEN ---
        var map = L.map('map', { zoomControl: false, center: [53.5, 8.5], zoom: 8 });
        var waypoints = [], markers = [], routeSegments = [], touchSegments = [];
        var isMonitoring = false, shipMarker = null, watchId = null, hasCompass = false, dynamicNavLine = null;
        var routesDB = JSON.parse(localStorage.getItem('seafarer_routes_db')) || {};
        var pinnedPixel = null; // Voor de relatieve beweging

        const layers = {
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
            bathymetry: L.tileLayer('https://tiles.openseamap.org/bathymetry/{z}/{x}/{y}.png', { maxZoom: 18 }),
            seamarks: L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {maxZoom: 18}),
            arcgis: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {maxZoom: 13}),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom: 19})
        };
        var currentLayerGroup = L.layerGroup().addTo(map);

        window.changeLayer = function(type) {
            currentLayerGroup.clearLayers();
            if (type === 'onc') { currentLayerGroup.addLayer(layers.osm).addLayer(layers.bathymetry).addLayer(layers.seamarks); }
            else if (type === 'nautical') { currentLayerGroup.addLayer(layers.osm).addLayer(layers.arcgis).addLayer(layers.seamarks); }
            else if (type === 'sat') { currentLayerGroup.addLayer(layers.sat).addLayer(layers.seamarks); }
        };
        changeLayer('onc');

        // --- SCHIP SYMBOOL ---
        var shipIcon = L.divIcon({
            className: 'ship-icon',
            html: `<img id="ship-img" src="https://cdn-icons-png.flaticon.com/512/103/103002.png" style="transform: rotate(0deg); width: 40px; height: 40px;">`,
            iconSize: [40, 40], iconAnchor: [20, 20]
        });

        // --- ROUTE MAKEN ---
        map.on('contextmenu', function(e) {
            addWaypoint(e.latlng.lat, e.latlng.lng);
        });

        function addWaypoint(lat, lng, index = null) {
            let newWp = {lat: lat, lng: lng, note: ""};
            if (index !== null) waypoints.splice(index, 0, newWp);
            else waypoints.push(newWp);
            updateRoute();
        }

        function updateRoute() {
            markers.forEach(m => map.removeLayer(m));
            routeSegments.forEach(l => map.removeLayer(l));
            touchSegments.forEach(l => map.removeLayer(l));
            markers = []; routeSegments = []; touchSegments = [];

            waypoints.forEach((wp, i) => {
                let m = L.marker([wp.lat, wp.lng], {draggable: true}).addTo(map);
                
                // Live lijnen meebewegen
                m.on('drag', e => {
                    waypoints[i].lat = e.latlng.lat;
                    waypoints[i].lng = e.latlng.lng;
                    if (i > 0) {
                        let coordsPrev = [[waypoints[i-1].lat, waypoints[i-1].lng], [e.latlng.lat, e.latlng.lng]];
                        routeSegments[i-1].setLatLngs(coordsPrev);
                        touchSegments[i-1].setLatLngs(coordsPrev);
                    }
                    if (i < waypoints.length - 1) {
                        let coordsNext = [[e.latlng.lat, e.latlng.lng], [waypoints[i+1].lat, waypoints[i+1].lng]];
                        routeSegments[i].setLatLngs(coordsNext);
                        touchSegments[i].setLatLngs(coordsNext);
                    }
                });

                m.on('dragend', () => updateRoute());

                let nav = (i < waypoints.length - 1) ? calculateNav([wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]) : null;
                let totalRem = calculateTotalFrom(i);

                let content = document.createElement('div');
                content.className = 'wp-popup';
                content.innerHTML = `
                    <b style="font-size:14px; color:#5bc0be;">WAYPOINT ${i+1}</b><br>
                    ${nav ? `Koers: <b>${nav.course}°</b> | Afstand: <b>${nav.dist} NM</b><br>` : "<b>Eindbestemming</b><br>"}
                    <span style="color:#777;">Totaal resterend: ${totalRem} NM</span><hr style="margin:5px 0;">
                    <textarea placeholder="Notitie..." id="note-${i}">${wp.note || ""}</textarea>
                    <button class="btn" style="background:#4caf50; color:white;" onclick="saveNote(${i})">Opslaan</button>
                    <button class="btn btn-del" onclick="removeWaypoint(${i})">❌ Wis WP</button>
                `;
                m.bindPopup(content);
                markers.push(m);

                if (i < waypoints.length - 1) {
                    let p1 = [wp.lat, wp.lng], p2 = [waypoints[i+1].lat, waypoints[i+1].lng];
                    routeSegments.push(L.polyline([p1, p2], {color: 'red', weight: 4, dashArray: '5, 10'}).addTo(map));
                    let tl = L.polyline([p1, p2], {color: 'transparent', weight: 25}).addTo(map);
                    tl.on('click', e => addWaypoint(e.latlng.lat, e.latlng.lng, i + 1));
                    touchSegments.push(tl);
                }
            });
        }

        window.saveNote = function(i) { waypoints[i].note = document.getElementById(`note-${i}`).value; map.closePopup(); };
        window.removeWaypoint = function(i) { waypoints.splice(i, 1); updateRoute(); };
        window.clearRoute = function() { if(confirm("Huidige route wissen?")) { waypoints = []; updateRoute(); } };

        function calculateNav(p1, p2) {
            let d = (map.distance(p1, p2) / 1852).toFixed(1);
            let lat1 = p1[0] * Math.PI / 180, lat2 = p2[0] * Math.PI / 180;
            let dLon = (p2[1] - p1[1]) * Math.PI / 180;
            let y = Math.sin(dLon) * Math.cos(lat2);
            let x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            return { course: Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360).toString().padStart(3, '0'), dist: d };
        }

        function calculateTotalFrom(idx) {
            let t = 0;
            for (let i = idx; i < waypoints.length - 1; i++) { t += map.distance([waypoints[i].lat, waypoints[i].lng], [waypoints[i+1].lat, waypoints[i+1].lng]); }
            return (t / 1852).toFixed(1);
        }

        // --- NAMEN, OPSLAAN & LADEN ---
        window.saveRouteByName = function() {
            let name = prompt("Geef de route een naam:");
            if (name) { routesDB[name] = waypoints; localStorage.setItem('seafarer_routes_db', JSON.stringify(routesDB)); alert("Opgeslagen!"); }
        };

        window.loadRouteByName = function() {
            let names = Object.keys(routesDB);
            if(names.length === 0) { alert("Geen routes gevonden."); return; }
            let selected = prompt(`Beschikbare routes:\n- ${names.join("\n- ")}`);
            if (selected && routesDB[selected]) { waypoints = routesDB[selected]; updateRoute(); }
        };

        // --- MONITORING (GPS, Kompas & Wake Lock) ---
        window.toggleMonitoring = function() {
            isMonitoring = !isMonitoring;
            let btn = document.getElementById('monitorBtn');
            let bar = document.getElementById('monitor-bar');
            
            if (isMonitoring) {
                requestWakeLock();
                btn.innerHTML = "🛑 Stop Monitoring";
                btn.style.background = "#ff4d4d"; btn.style.color = "white";
                bar.style.display = "flex";
                if (navigator.geolocation) watchId = navigator.geolocation.watchPosition(updateShip, console.error, {enableHighAccuracy: true});
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(state => {
                        if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    }).catch(console.error);
                } else { window.addEventListener('deviceorientation', handleOrientation); }
            } else {
                if(wakeLock) wakeLock.release();
                btn.innerHTML = "📡 Start Monitoring";
                btn.style.background = "#ff9f1c"; btn.style.color = "#0b132b";
                bar.style.display = "none";
                if(watchId) navigator.geolocation.clearWatch(watchId);
                window.removeEventListener('deviceorientation', handleOrientation);
                if(shipMarker) map.removeLayer(shipMarker);
                if(dynamicNavLine) map.removeLayer(dynamicNavLine);
                shipMarker = null; dynamicNavLine = null; hasCompass = false;
            }
        };

        function updateShip(pos) {
            let lat = pos.coords.latitude, lng = pos.coords.longitude;
            let cog = pos.coords.heading || 0, sog = (pos.coords.speed * 1.943) || 0;
            if (!shipMarker) {
                shipMarker = L.marker([lat, lng], {draggable: true, zIndexOffset: 1000, icon: shipIcon}).addTo(map);
                // Pin-logica
                shipMarker.on('dragend', function() {
                    pinnedPixel = map.latLngToContainerPoint(shipMarker.getLatLng());
                });
            } else {
                shipMarker.setLatLng([lat, lng]);
                if (!hasCompass) {
                    let icon = document.getElementById('ship-img');
                    if (icon) icon.style.transform = `rotate(${cog}deg)`;
                }
            }
            
            // Relatieve beweging (pinnen)
            if (pinnedPixel) {
                let target = map.containerPointToLatLng(pinnedPixel);
                map.panTo([map.getCenter().lat + (lat - target.lat), map.getCenter().lng + (lng - target.lng)], {animate: false});
            } else {
                map.panTo([lat, lng]); // Standaard centreren
            }

            document.getElementById('sog').innerText = sog.toFixed(1) + " kn";
            document.getElementById('cog').innerText = Math.round(cog).toString().padStart(3, '0') + "°";
            
            if (waypoints.length > 0) {
                let d = (map.distance([lat, lng], [waypoints[0].lat, waypoints[0].lng]) / 1852).toFixed(1);
                document.getElementById('next-wp').innerText = d + " NM";
                let coords = [[lat, lng], [waypoints[0].lat, waypoints[0].lng]];
                if (!dynamicNavLine) { dynamicNavLine = L.polyline(coords, {color: '#ff9f1c', weight: 3, dashArray: '5,5'}).addTo(map);
                } else { dynamicNavLine.setLatLngs(coords); }
            } else if (dynamicNavLine) {
                map.removeLayer(dynamicNavLine);
                dynamicNavLine = null;
            }
        }

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || (event.alpha !== null ? 360 - event.alpha : null);
            if (heading !== null) {
                hasCompass = true;
                document.getElementById('hdg').innerText = Math.round(heading).toString().padStart(3, '0') + "°";
                let icon = document.getElementById('ship-img');
                if (icon) icon.style.transform = `rotate(${heading}deg)`;
            }
        }

        window.togglePanel = function() { document.getElementById('planner-panel').classList.toggle('minimized'); document.getElementById('panel-content').classList.toggle('hidden'); document.getElementById('min-icon').innerText = document.getElementById('planner-panel').classList.contains('minimized') ? "+" : "_"; };
        window.planSmartRoute = function() { waypoints = [{lat: 52.43, lng: 4.25, note:"Start"}, {lat: 53.05, lng: 4.40, note:"TSS"}, {lat: 53.88, lng: 8.75, note:"Cuxhaven"}, {lat: 53.54, lng: 9.92, note:"Hamburg"}]; updateRoute(); }
        window.exportToRTZ = function() { let xml = `<?xml version="1.0" encoding="UTF-8"?><route version="1.0" xmlns="http://www.cirm.org/RTZ/1/0"><routeInfo routeName="Seafarer_Route"/><waypoints>`; waypoints.forEach((wp, i) => { xml += `<waypoint id="${i+1}" name="WP${i+1}"><position lat="${wp.lat}" lon="${wp.lng}"/><leg portXTD="0.5" starboardXTD="0.5"/></waypoint>`; }); xml += `</waypoints></route>`; let blob = new Blob([xml], {type: "text/xml"}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Seafarer_Route.rtz"; a.click(); };
    </script>
</body>
</html>
