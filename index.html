<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seafarer Nav v4.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .panel { position: absolute; background: rgba(20, 30, 48, 0.95); padding: 12px; border-radius: 8px; z-index: 1000; border: 1px solid #5bc0be; }
        #planner-panel { top: 10px; right: 10px; width: 240px; }
        .panel-header { border-bottom: 1px solid #5bc0be; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; }
        #monitor-bar { bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 600px; display: none; justify-content: space-around; text-align: center; }
        .monitor-item { flex: 1; border-right: 1px solid #3a506b; }
        .monitor-item:last-child { border-right: none; }
        .val { font-size: 20px; font-weight: bold; color: #5bc0be; display: block; }
        .label { font-size: 10px; text-transform: uppercase; color: #a1a1aa; }
        .btn { display: block; width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; background: #3a506b; color: white; }
        .btn-start { background: #ff9f1c; color: #0b132b; }
        .wp-popup { color: black; font-size: 14px; }
        .vector-popup { color: black; line-height: 1.6; }
        input[type="number"] { width: 50px; padding: 3px; }
    </style>
</head>
<body>

    <div id="planner-panel" class="panel">
        <div class="panel-header">Seafarer Nav v4.0</div>
        <div style="display:flex; gap:5px;">
            <button class="btn" onclick="saveRouteRTZ()">💾 Opslaan</button>
            <button class="btn" onclick="document.getElementById('rtz-upload').click()">📂 Laden</button>
            <input type="file" id="rtz-upload" accept=".rtz, .voy, .zip" style="display:none;" onchange="loadRouteRTZ(event)">
        </div>
        <button class="btn" style="background:#4caf50;" onclick="nextActiveWP()">⏭️ Skip naar Volgend WP</button>
        <button class="btn" style="background:#555;" onclick="clearRoute()">🗑️ Wis Route</button>
        
        <select id="layerSelect" class="btn" onchange="changeLayer(this.value)" style="text-align: left;">
            <option value="onc">Kaart: OpenNautical</option>
            <option value="sat">Kaart: Satelliet</option>
        </select>

        <button class="btn btn-start" id="monitorBtn" onclick="toggleMonitoring()">📡 START MONITORING</button>
    </div>

    <div id="monitor-bar" class="panel">
        <div class="monitor-item"><span class="label">SOG</span><span class="val" id="sog">0.0 kn</span></div>
        <div class="monitor-item"><span class="label">COG</span><span class="val" id="cog">000°</span></div>
        <div class="monitor-item"><span class="label">Route Leg</span><span class="val" id="wp-info">--</span></div>
        <div class="monitor-item"><span class="label">ETA (End)</span><span class="val" id="eta">--:--</span></div>
    </div>

    <div id="map"></div>

    <script>
        // --- NAVIGATIE VARIABELEN ---
        var map = L.map('map', { zoomControl: false, center: [53.9, 9.15], zoom: 11 });
        var waypoints = [], routeLines = [], wpMarkers = [];
        var activeWpIndex = 0, vectorMinutes = 6;
        var shipPos = null, vectorLine = null, shipCircle = null;
        var isMonitoring = false, watchId = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- AUDIO (Dubbel piepje) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq, duration, delay) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = freq; gain.gain.value = 0.1;
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            }, delay);
        }
        function playArrivalBeep() { beep(880, 0.1, 0); beep(880, 0.1, 200); }

        // --- GPS & VECTOR ---
        function toggleMonitoring() {
            if (!isMonitoring) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isMonitoring = true;
                document.getElementById('monitorBtn').innerText = "🛑 STOP MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff4d4d";
                document.getElementById('monitor-bar').style.display = "flex";
                watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
            } else {
                isMonitoring = false;
                navigator.geolocation.clearWatch(watchId);
                location.reload(); 
            }
        }

        function updatePosition(pos) {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const sog = (pos.coords.speed * 1.94384) || 0;
            const cog = pos.coords.heading || 0;
            shipPos = [lat, lon];

            // Update Dashboard
            document.getElementById('sog').innerText = sog.toFixed(1) + " kn";
            document.getElementById('cog').innerText = Math.round(cog).toString().padStart(3, '0') + "°";
            
            updateVector(lat, lon, cog, sog);
            checkBisector(lat, lon);
            calculateETA(lat, lon, sog);
        }

        function updateVector(lat, lon, cog, sog) {
            if (shipCircle) map.removeLayer(shipCircle);
            if (vectorLine) map.removeLayer(vectorLine);

            // De Cirkel
            shipCircle = L.circleMarker([lat, lon], { radius: 8, color: '#00d1ff', fillOpacity: 0.8 }).addTo(map);
            
            // Coördinaten naar DD MM.m
            const latD = Math.floor(Math.abs(lat)), latM = ((Math.abs(lat) - latD) * 60).toFixed(1);
            const lonD = Math.floor(Math.abs(lon)), lonM = ((Math.abs(lon) - lonD) * 60).toFixed(1);
            const posStr = `${latD}°${latM}'${lat >=0?'N':'S'} ${lonD}°${lonM}'${lon >=0?'E':'W'}`;

            shipCircle.bindPopup(`
                <div class="vector-popup">
                    <b>Positie:</b> ${posStr}<br>
                    <b>COG:</b> ${Math.round(cog)}° | <b>SOG:</b> ${sog.toFixed(1)} kn<br>
                    <b>Vector lengte (min):</b> 
                    <input type="number" value="${vectorMinutes}" onchange="vectorMinutes=this.value; updatePosition(lastPos)">
                </div>
            `);

            // De Pijl (Vector)
            const dist = (sog * (vectorMinutes / 60)); // NM
            const dest = calculateDestination(lat, lon, cog, dist);
            vectorLine = L.polyline([[lat, lon], dest], {color: '#00d1ff', weight: 4}).addTo(map);
            map.panTo([lat, lon]);
        }

        // --- BISECTRICE LOGICA ---
        function checkBisector(lat, lon) {
            if (waypoints.length < 2 || activeWpIndex >= waypoints.length - 1) return;

            const p1 = (activeWpIndex === 0) ? shipPos : [waypoints[activeWpIndex-1].lat, waypoints[activeWpIndex-1].lng];
            const p2 = [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng];
            const p3 = [waypoints[activeWpIndex+1].lat, waypoints[activeWpIndex+1].lng];

            // Bereken koersen tussen legs
            const bearing1 = getBearing(p1[0], p1[1], p2[0], p2[1]);
            const bearing2 = getBearing(p2[0], p2[1], p3[0], p3[1]);
            
            // Bisectrice hoek
            let bisectorAngle = (bearing1 + bearing2) / 2 + 90;
            
            // Afstand tot waypoint (0.2 NM zone)
            const distToWp = map.distance([lat, lon], p2) / 1852;
            
            // Eenvoudige check: als we voorbij de denkbeeldige lijn van het waypoint zijn
            if (distToWp < 0.2) {
                playArrivalBeep();
                activeWpIndex++;
                updateRouteDisplay();
            }
        }

        function calculateETA(lat, lon, sog) {
            if (waypoints.length === 0 || sog < 0.5) {
                document.getElementById('eta').innerText = "--:--";
                return;
            }

            let totalDist = map.distance([lat, lon], [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]);
            for (let i = activeWpIndex; i < waypoints.length - 1; i++) {
                totalDist += map.distance([waypoints[i].lat, waypoints[i].lng], [waypoints[i+1].lat, waypoints[i+1].lng]);
            }

            const distNM = totalDist / 1852;
            const hoursToTravel = distNM / sog;
            const etaDate = new Date(Date.now() + hoursToTravel * 3600000);
            
            document.getElementById('eta').innerText = etaDate.getHours().toString().padStart(2, '0') + ":" + etaDate.getMinutes().toString().padStart(2, '0');
            document.getElementById('wp-info').innerText = `WP ${activeWpIndex + 1}`;
        }

        // --- HELPERS ---
        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function calculateDestination(lat, lon, brng, dist) {
            const R = 3440.065; // Radius aarde in NM
            const ad = dist / R;
            const la1 = lat * Math.PI / 180;
            const lo1 = lon * Math.PI / 180;
            const br = brng * Math.PI / 180;
            const la2 = Math.asin(Math.sin(la1) * Math.cos(ad) + Math.cos(la1) * Math.sin(ad) * Math.cos(br));
            const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(ad) * Math.cos(la1), Math.cos(ad) - Math.sin(la1) * Math.sin(la2));
            return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
        }

        // --- ROUTE HANDLERS ---
        window.loadRouteRTZ = async function(e) {
            const file = e.target.files[0];
            const zip = new JSZip();
            let text = "";
            if (file.name.endsWith('.voy')) {
                const c = await zip.loadAsync(file);
                const r = Object.keys(c.files).find(n => n.endsWith('.rtz'));
                text = await c.files[r].async("text");
            } else { text = await file.text(); }
            
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const wps = xml.getElementsByTagName("waypoint");
            waypoints = []; activeWpIndex = 0;
            for (let i = 0; i < wps.length; i++) {
                const pos = wps[i].getElementsByTagName("position")[0];
                waypoints.push({lat: parseFloat(pos.getAttribute("lat")), lng: parseFloat(pos.getAttribute("lon"))});
            }
            updateRouteDisplay();
        };

        function updateRouteDisplay() {
            routeLines.forEach(l => map.removeLayer(l));
            wpMarkers.forEach(m => map.removeLayer(m));
            routeLines = []; wpMarkers = [];

            waypoints.forEach((wp, i) => {
                const color = (i < activeWpIndex) ? '#555' : (i === activeWpIndex ? '#ff9f1c' : 'red');
                const m = L.circleMarker([wp.lat, wp.lng], {radius: 6, color: color}).addTo(map);
                m.bindPopup(`<div class="wp-popup">WP ${i+1}<br><button onclick="activeWpIndex=${i}; updateRouteDisplay();">📍 Activeer</button></div>`);
                wpMarkers.push(m);
                if (i < waypoints.length - 1) {
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: color, weight: 3}).addTo(map);
                    routeLines.push(l);
                }
            });
        }

        window.nextActiveWP = function() { activeWpIndex++; updateRouteDisplay(); };
        window.clearRoute = function() { waypoints = []; updateRouteDisplay(); };
        function changeLayer(v) { 
            if(v==='sat') L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            else location.reload();
        }
    </script>
</body>
</html>
