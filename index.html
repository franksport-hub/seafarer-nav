<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seafarer Nav v4.8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; background: #001220; }
        .panel { position: absolute; background: rgba(20, 30, 48, 0.95); padding: 12px; border-radius: 8px; z-index: 1000; border: 1px solid #5bc0be; transition: all 0.3s ease; }
        #planner-panel { top: 10px; right: 10px; width: 240px; }
        #planner-panel.minimized { width: 44px; height: 44px; padding: 0; overflow: hidden; border: 2px solid #5bc0be; }
        .hamburger-icon { display: none; width: 44px; height: 44px; line-height: 44px; text-align: center; font-size: 24px; cursor: pointer; background: #1c2541; }
        #planner-panel.minimized .hamburger-icon { display: block; }
        #planner-panel.minimized .panel-content { display: none; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5bc0be; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; }
        #monitor-bar { bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 750px; display: none; justify-content: space-around; text-align: center; }
        .monitor-item { flex: 1; border-right: 1px solid #3a506b; }
        .monitor-item:last-child { border-right: none; }
        .val { font-size: 18px; font-weight: bold; color: #5bc0be; display: block; }
        .label { font-size: 9px; text-transform: uppercase; color: #a1a1aa; }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; background: #3a506b; color: white; }
        .btn-start { background: #ff9f1c; color: #0b132b; }
        .btn-danger { background: #ff4d4d !important; color: white; }
        .wp-popup { color: black; line-height: 1.2; min-width: 180px; font-size: 12px; }
        .wp-popup input { width: 100%; margin: 5px 0; padding: 4px; box-sizing: border-box; }
        .wp-popup b { color: #1c2541; }
    </style>
</head>
<body>

    <div id="planner-panel" class="panel">
        <div class="hamburger-icon" onclick="toggleMenu()">☰</div>
        <div class="panel-content">
            <div class="panel-header"><span>Seafarer Nav v4.8</span><span onclick="toggleMenu()" style="cursor:pointer; padding: 5px;">×</span></div>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="saveRouteRTZ()">💾 Opslaan</button>
                <button class="btn" onclick="document.getElementById('rtz-upload').click()">📂 Laden</button>
                <input type="file" id="rtz-upload" accept=".rtz, .voy, .zip" style="display:none;" onchange="loadRouteRTZ(event)">
            </div>
            <button class="btn" style="background:#4caf50;" onclick="nextActiveWP()">⏭️ Volgend WP</button>
            <button class="btn" style="background:#555;" onclick="clearRoute()">🗑️ Wis Route</button>
            <select id="layerSelect" class="btn" onchange="changeLayer(this.value)">
                <option value="onc">Kaart: OpenNautical</option>
                <option value="arcgis">Kaart: ArcGIS Ocean</option>
                <option value="sat">Kaart: Satelliet + Seamarks</option>
            </select>
            <button class="btn btn-start" id="monitorBtn" onclick="toggleMonitoring()">📡 START MONITORING</button>
        </div>
    </div>

    <div id="monitor-bar" class="panel">
        <div class="monitor-item"><span class="label">SOG (avg)</span><span class="val" id="sog">0.0 kn</span></div>
        <div class="monitor-item"><span class="label">COG</span><span class="val" id="cog">000°</span></div>
        <div class="monitor-item"><span class="label">Naar WP</span><span class="val" id="wp-info">--</span></div>
        <div class="monitor-item"><span class="label">TTG</span><span class="val" id="ttg">00:00</span></div>
        <div class="monitor-item"><span class="label">ETA (End)</span><span class="val" id="eta">--:--</span></div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false, center: [53.9, 9.15], zoom: 11 });
        var waypoints = [], routeLines = [], wpMarkers = [];
        var activeWpIndex = 0, vectorMinutes = 6, speedHistory = [], lastSog = 0;
        var shipPos = null, vectorLine = null, shipCircle = null, isMonitoring = false, watchId = null;
        var mapOffset = null; 

        const baseLayers = {
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            seamarks: L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            arcgis: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 })
        };

        var currentBase = L.layerGroup([baseLayers.osm, baseLayers.seamarks]).addTo(map);

        function changeLayer(type) {
            map.removeLayer(currentBase);
            if (type === 'onc') currentBase = L.layerGroup([baseLayers.osm, baseLayers.seamarks]).addTo(map);
            else if (type === 'arcgis') currentBase = L.layerGroup([baseLayers.arcgis, baseLayers.seamarks]).addTo(map);
            else currentBase = L.layerGroup([baseLayers.sat, baseLayers.seamarks]).addTo(map);
        }

        function toggleMenu() { document.getElementById('planner-panel').classList.toggle('minimized'); }

        // --- STAP 1: STOP ZONDER RELOAD ---
        function toggleMonitoring() {
            if (!isMonitoring) {
                isMonitoring = true;
                document.getElementById('monitorBtn').innerText = "🛑 STOP MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff4d4d";
                document.getElementById('monitor-bar').style.display = "flex";
                watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
            } else {
                isMonitoring = false;
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('monitorBtn').innerText = "📡 START MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff9f1c";
                // De route en positie blijven nu gewoon staan.
            }
        }

        function updatePosition(pos) {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const rawSog = (pos.coords.speed * 1.94384) || 0;
            const cog = pos.coords.heading || 0;
            shipPos = [lat, lon];
            speedHistory.push(rawSog);
            if (speedHistory.length > 10) speedHistory.shift();
            lastSog = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
            document.getElementById('sog').innerText = lastSog.toFixed(1) + " kn";
            document.getElementById('cog').innerText = Math.round(cog).toString().padStart(3, '0') + "°";
            updateShipGraphics(lat, lon, cog, lastSog);
            calculateNavData(lat, lon, lastSog);
        }

        function updateShipGraphics(lat, lon, cog, sog) {
            const ringIcon = L.divIcon({
                className: 'ship-ring',
                html: '<div style="width:16px; height:16px; border:3px solid #ff9f1c; border-radius:50%;"></div>',
                iconSize: [22, 22], iconAnchor: [11, 11]
            });
            if (!shipCircle) {
                shipCircle = L.marker([lat, lon], { draggable: true, icon: ringIcon, zIndexOffset: 1000 }).addTo(map);
                shipCircle.on('dragend', function(e) {
                    const markerPx = map.latLngToLayerPoint(e.target.getLatLng());
                    const centerPx = map.latLngToLayerPoint(map.getCenter());
                    mapOffset = { x: markerPx.x - centerPx.x, y: markerPx.y - centerPx.y };
                });
            } else shipCircle.setLatLng([lat, lon]);

            const dist = (sog * (vectorMinutes / 60));
            const dest = calculateDestination(lat, lon, cog, dist);
            if (!vectorLine) vectorLine = L.polyline([[lat, lon], dest], {color: '#ff9f1c', weight: 4}).addTo(map);
            else vectorLine.setLatLngs([[lat, lon], dest]);

            if (mapOffset) {
                const targetPx = map.latLngToLayerPoint([lat, lon]);
                const newCenterLatLng = map.layerPointToLatLng(L.point(targetPx.x - mapOffset.x, targetPx.y - mapOffset.y));
                map.setView(newCenterLatLng, map.getZoom(), { animate: false });
            } else map.panTo([lat, lon], { animate: false });
        }

        // --- STAP 2 & WP DETAILS ---
        function updateRouteDisplay() {
            routeLines.forEach(l => map.removeLayer(l)); 
            wpMarkers.forEach(m => map.removeLayer(m));
            routeLines = []; wpMarkers = [];

            waypoints.forEach((wp, i) => {
                const isTarget = (i === activeWpIndex);
                const color = (i < activeWpIndex) ? '#555' : (isTarget ? '#ff9f1c' : 'red');
                
                // Bereken ETA voor dit specifieke WP
                let etaStr = "--:--";
                if (shipPos && lastSog > 0.1) {
                    let d = map.distance(shipPos, [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]);
                    for (let j = activeWpIndex; j < i; j++) {
                        d += map.distance([waypoints[j].lat, waypoints[j].lng], [waypoints[j+1].lat, waypoints[j+1].lng]);
                    }
                    const hours = (d / 1852) / lastSog;
                    const etaDate = new Date(Date.now() + hours * 3600000);
                    etaStr = etaDate.getHours().toString().padStart(2, '0') + ":" + etaDate.getMinutes().toString().padStart(2, '0');
                }

                // Marker met Drag en Tap
                const m = L.marker([wp.lat, wp.lng], {
                    draggable: true,
                    icon: L.divIcon({
                        className: 'wp-icon',
                        html: `<div style="width:12px; height:12px; background:${color}; border:2px solid white; border-radius:50%;"></div>`,
                        iconSize: [16, 16], iconAnchor: [8, 8]
                    })
                }).addTo(map);

                m.on('drag', function(e) {
                    waypoints[i].lat = e.target.getLatLng().lat;
                    waypoints[i].lng = e.target.getLatLng().lng;
                    drawRouteOnly();
                });
                m.on('dragend', updateRouteDisplay);

                // Menu bij aantikken
                m.bindPopup(`
                    <div class="wp-popup">
                        <b>WAYPOINT ${i+1}</b><br>
                        <small>ETA WP: ${etaStr}</small><hr>
                        Notitie:<br>
                        <input type="text" id="note-${i}" value="${wp.note || ''}" onchange="waypoints[${i}].note=this.value" placeholder="Bijv. Sluis bakboord...">
                        <button class="btn" onclick="setActiveWp(${i})">📍 Activeren (Naar WP)</button>
                        <button class="btn btn-danger" onclick="removeWaypoint(${i})">🗑️ Verwijder</button>
                    </div>
                `);

                wpMarkers.push(m);

                if (i < waypoints.length - 1) {
                    const legColor = (i === activeWpIndex - 1) ? '#ff9f1c' : (i < activeWpIndex - 1 ? '#555' : 'red');
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: legColor, weight: 4}).addTo(map);
                    l.on('contextmenu', (e) => insertWaypoint(i + 1, e.latlng));
                    routeLines.push(l);
                }
            });
        }

        function calculateNavData(lat, lon, sog) {
            if (waypoints.length === 0 || activeWpIndex >= waypoints.length || sog < 0.2) return;
            let d = map.distance([lat, lon], [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]);
            for (let i = activeWpIndex; i < waypoints.length - 1; i++) d += map.distance([waypoints[i].lat, waypoints[i].lng], [waypoints[i+1].lat, waypoints[i+1].lng]);
            const hoursTotal = (d / 1852) / sog;
            const h = Math.floor(hoursTotal), m = Math.floor((hoursTotal - h) * 60);
            document.getElementById('ttg').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            const eta = new Date(Date.now() + hoursTotal * 3600000);
            document.getElementById('eta').innerText = eta.getHours().toString().padStart(2, '0') + ":" + eta.getMinutes().toString().padStart(2, '0');
            document.getElementById('wp-info').innerText = `WP ${activeWpIndex + 1}`;
        }

        function drawRouteOnly() {
            routeLines.forEach(l => map.removeLayer(l));
            routeLines = [];
            waypoints.forEach((wp, i) => {
                if (i < waypoints.length - 1) {
                    const legColor = (i === activeWpIndex - 1) ? '#ff9f1c' : (i < activeWpIndex - 1 ? '#555' : 'red');
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: legColor, weight: 4}).addTo(map);
                    routeLines.push(l);
                }
            });
        }

        function insertWaypoint(index, latlng) {
            waypoints.splice(index, 0, {lat: latlng.lat, lng: latlng.lng, note: ""});
            updateRouteDisplay();
        }

        window.setActiveWp = function(i) { activeWpIndex = i; updateRouteDisplay(); map.closePopup(); };
        window.removeWaypoint = function(i) { waypoints.splice(i, 1); if (activeWpIndex >= waypoints.length) activeWpIndex = Math.max(0, waypoints.length - 1); updateRouteDisplay(); map.closePopup(); };

        function calculateDestination(lat, lon, brng, dist) {
            const R = 3440.065; const ad = dist / R;
            const la1 = lat * Math.PI / 180, lo1 = lon * Math.PI / 180, br = brng * Math.PI / 180;
            const la2 = Math.asin(Math.sin(la1) * Math.cos(ad) + Math.cos(la1) * Math.sin(ad) * Math.cos(br));
            const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(ad) * Math.cos(la1), Math.cos(ad) - Math.sin(la1) * Math.sin(la2));
            return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
        }

        window.loadRouteRTZ = async function(e) {
            const file = e.target.files[0]; if (!file) return;
            let text = "";
            if (file.name.endsWith('.voy')) {
                const zip = new JSZip(); const c = await zip.loadAsync(file);
                const r = Object.keys(c.files).find(n => n.endsWith('.rtz'));
                text = await c.files[r].async("text");
            } else text = await file.text();
            const parser = new DOMParser(); const xml = parser.parseFromString(text, "text/xml");
            const wps = xml.getElementsByTagName("waypoint");
            waypoints = []; activeWpIndex = 0;
            for (let i = 0; i < wps.length; i++) {
                const pos = wps[i].getElementsByTagName("position")[0];
                waypoints.push({lat: parseFloat(pos.getAttribute("lat")), lng: parseFloat(pos.getAttribute("lon")), note: ""});
            }
            updateRouteDisplay();
        };

        window.nextActiveWP = function() { activeWpIndex = (activeWpIndex + 1) % waypoints.length; updateRouteDisplay(); };
        window.clearRoute = function() { waypoints = []; activeWpIndex = 0; updateRouteDisplay(); };
        window.saveRouteRTZ = function() {
            if(waypoints.length === 0) return;
            let n = prompt("Naam:", "Route"); if(!n) return;
            let xml = `<?xml version="1.0" encoding="UTF-8"?><route xmlns="http://www.cirm.org/RTZ/1/0"><waypoints>`; 
            waypoints.forEach((wp, i) => { xml += `<waypoint id="${i+1}"><position lat="${wp.lat}" lon="${wp.lng}"/></waypoint>`; }); 
            xml += `</waypoints></route>`; 
            let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([xml], {type: "application/xml"})); a.download = n + ".rtz"; a.click(); 
        };
    </script>
</body>
</html>
