<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seafarer Nav v5.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; background: #001220; }
        
        /* UI Panels */
        .panel { position: absolute; background: rgba(20, 30, 48, 0.95); padding: 12px; border-radius: 8px; z-index: 1000; border: 1px solid #5bc0be; transition: all 0.3s ease; }
        #planner-panel { top: 10px; right: 10px; width: 240px; }
        #planner-panel.minimized { width: 44px; height: 44px; padding: 0; overflow: hidden; border: 2px solid #5bc0be; }
        .hamburger-icon { display: none; width: 44px; height: 44px; line-height: 44px; text-align: center; font-size: 24px; cursor: pointer; background: #1c2541; }
        #planner-panel.minimized .hamburger-icon { display: block; }
        #planner-panel.minimized .panel-content { display: none; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5bc0be; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; }
        
        /* Nieuw Dashboard */
        #new-dashboard {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85px;
            background: #2f3e50; display: none; justify-content: space-between; align-items: center;
            color: white; z-index: 1000; box-sizing: border-box; padding: 5px 20px;
            border-top: 2px solid #5bc0be;
        }
        .dash-col { display: flex; flex-direction: column; justify-content: center; }
        .dash-left { flex: 1; align-items: flex-start; }
        .dash-center { flex: 1; align-items: center; }
        .dash-right { flex: 1; align-items: flex-start; text-align: left; padding-left: 15px; border-left: 1px solid #3a506b; }
        
        .dash-title { font-size: 11px; color: #a1a1aa; text-transform: uppercase; margin-bottom: 2px; }
        .dash-val { font-size: 20px; font-weight: bold; color: #fff; }
        .dash-snelheid { font-size: 34px; font-weight: bold; color: #fff; line-height: 1; margin: 2px 0; }
        .dash-unit { font-size: 11px; color: #a1a1aa; }
        .dash-gps { font-size: 13px; font-family: monospace; color: #fff; margin-bottom: 4px; letter-spacing: 0.5px; line-height: 1.2; }
        .dash-nav { font-size: 12px; color: #5bc0be; font-weight: bold; line-height: 1.3; }
        
        .btn { display: block; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; background: #3a506b; color: white; }
        .btn-start { background: #ff9f1c; color: #0b132b; }
        .btn-danger { background: #ff4d4d !important; color: white; }
        
        .wp-popup { color: black; line-height: 1.3; min-width: 200px; font-size: 12px; }
        .wp-popup input { width: 100%; margin: 5px 0; padding: 4px; box-sizing: border-box; }
        
        /* Recenter Button */
        #recenter-btn { 
            position: absolute; bottom: 105px; right: 20px; width: 44px; height: 44px; 
            background: rgba(20, 30, 48, 0.9); border: 2px solid #5bc0be; border-radius: 50%; 
            z-index: 1000; display: none; cursor: pointer; justify-content: center; align-items: center; 
        }
        .crosshair {
            width: 20px; height: 20px; border: 2px solid #5bc0be; border-radius: 50%; position: relative;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: #5bc0be;
        }
        .crosshair::before { top: -2px; bottom: -2px; left: 50%; width: 2px; margin-left: -1px; }
        .crosshair::after { left: -2px; right: -2px; top: 50%; height: 2px; margin-top: -1px; }
    </style>
</head>
<body>

    <div id="planner-panel" class="panel minimized">
        <div class="hamburger-icon" onclick="toggleMenu()">☰</div>
        <div class="panel-content">
            <div class="panel-header"><span>Seafarer Nav v5.3</span><span onclick="toggleMenu()" style="cursor:pointer; padding: 5px;">×</span></div>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="saveRouteRTZ()">💾 Opslaan</button>
                <button class="btn" onclick="document.getElementById('rtz-upload').click()">📂 Laden</button>
                <input type="file" id="rtz-upload" accept=".rtz, .voy, .zip" style="display:none;" onchange="loadRouteRTZ(event)">
            </div>
            
            <hr style="border-color:#3a506b; margin-top: 10px;">
            <div style="font-size: 10px; margin-bottom: 2px; color:#a1a1aa;">Opslaglocatie Routes:</div>
            <select id="saveLocationPref" class="btn" style="background:#1c2541; margin-top:0;" onchange="localStorage.setItem('savePref', this.value)">
                <option value="prompt">Vraag per keer (Locatie kiezen)</option>
                <option value="downloads">Standaard Downloads map</option>
            </select>
            <hr style="border-color:#3a506b; margin-bottom: 10px;">

            <button class="btn" id="newRouteBtn" onclick="toggleRouteCreation()">📍 Nieuwe route: UIT</button>
            <button class="btn" style="background:#4caf50;" onclick="nextActiveWP()">⏭️ Volgend WP</button>
            <button class="btn" style="background:#555;" onclick="clearRoute()">🗑️ Wis Route</button>
            <select id="layerSelect" class="btn" onchange="changeLayer(this.value)">
                <option value="onc">Kaart: OpenNautical</option>
                <option value="arcgis">Kaart: ArcGIS Ocean</option>
                <option value="sat">Kaart: Satelliet</option>
            </select>
            <button class="btn btn-start" id="monitorBtn" onclick="toggleMonitoring()">📡 START MONITORING</button>
        </div>
    </div>

    <div id="new-dashboard">
        <div class="dash-col dash-left">
            <div class="dash-title">Kompas</div>
            <div class="dash-val"><span id="cog-val">000</span>°</div>
        </div>
        <div class="dash-col dash-center">
            <div class="dash-title">Snelheid</div>
            <div class="dash-snelheid"><span id="sog-val">0.0</span></div>
            <div class="dash-unit">knopen</div>
        </div>
        <div class="dash-col dash-right">
            <div class="dash-gps" id="gps-val">--°--.--' N<br>--°--.--' E</div>
            <div class="dash-nav">
                DTG: <span id="dtg-val">--.-</span> nm<br>TTG: <span id="ttg-val">--:--</span>
            </div>
        </div>
    </div>

    <div id="recenter-btn" onclick="recenterMap()">
        <div class="crosshair"></div>
    </div>

    <div id="map"></div>

    <script>
        // --- INLADEN VAN SETTINGS EN LOKALE ROUTE ---
        document.addEventListener("DOMContentLoaded", () => {
            const savedPref = localStorage.getItem('savePref');
            if (savedPref) document.getElementById('saveLocationPref').value = savedPref;
            loadRouteFromLocal();
        });

        // --- MAP INITIALISATIE ---
        var map = L.map('map', { zoomControl: false, center: [54.0, 4.0], zoom: 6 });
        map.createPane('seamarksPane');
        map.getPane('seamarksPane').style.zIndex = 650;
        map.getPane('seamarksPane').style.pointerEvents = 'none';

        var waypoints = [], routeLines = [], wpMarkers = [];
        var activeWpIndex = 0, vectorMinutes = 6, speedHistory = [], lastSog = 0;
        var shipPos = null, vectorLine = null, shipCircle = null, isMonitoring = false, watchId = null;
        var mapOffset = null; 
        var isFreePanning = false;
        var isCreatingRoute = false;
        var hasAutoSetWp = false;

        const baseLayers = {
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            arcgis: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 })
        };
        const seamarkLayer = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18, pane: 'seamarksPane' });

        var currentBase = baseLayers.osm.addTo(map);
        seamarkLayer.addTo(map);

        function changeLayer(type) {
            map.removeLayer(currentBase);
            if (type === 'onc') currentBase = baseLayers.osm.addTo(map);
            else if (type === 'arcgis') currentBase = baseLayers.arcgis.addTo(map);
            else currentBase = baseLayers.sat.addTo(map);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playArrivalBeep() { 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const b = (f, d, t) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = f; g.gain.value = 0.1;
                o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + d);
            };
            b(880, 0.1, 0); b(880, 0.1, 0.2);
        }

        function toggleMenu() { document.getElementById('planner-panel').classList.toggle('minimized'); }

        function toggleRouteCreation() {
            isCreatingRoute = !isCreatingRoute;
            const btn = document.getElementById('newRouteBtn');
            if (isCreatingRoute) {
                btn.innerText = "📍 Nieuwe route: AAN";
                btn.style.background = "#ff9f1c";
                btn.style.color = "#0b132b";
            } else {
                btn.innerText = "📍 Nieuwe route: UIT";
                btn.style.background = "#3a506b";
                btn.style.color = "white";
            }
        }

        // --- PANNING & RECENTER LOGICA ---
        map.on('dragstart', function() {
            if (isMonitoring) {
                isFreePanning = true;
                document.getElementById('recenter-btn').style.display = 'flex';
            }
        });

        function recenterMap() {
            isFreePanning = false;
            mapOffset = null; // Centreer de kaart weer precies op het schip
            document.getElementById('recenter-btn').style.display = 'none';
            if (shipPos) map.panTo(shipPos, { animate: true });
        }

        let mapPressTimer;
        map.on('mousedown touchstart', function(e) {
            if (!isCreatingRoute) return;
            mapPressTimer = setTimeout(() => {
                waypoints.push({lat: e.latlng.lat, lng: e.latlng.lng, note: ""});
                updateRouteDisplay();
            }, 1000);
        });
        map.on('mouseup touchend mousemove touchmove', function() {
            clearTimeout(mapPressTimer);
        });

        function formatGpsShort(lat, lon) {
            const latD = Math.floor(Math.abs(lat)), latM = ((Math.abs(lat) - latD) * 60).toFixed(2);
            const lonD = Math.floor(Math.abs(lon)), lonM = ((Math.abs(lon) - lonD) * 60).toFixed(2);
            return `${latD}°${latM}' ${lat>=0?'N':'S'}<br>${lonD}°${lonM}' ${lon>=0?'E':'W'}`;
        }

        function toggleMonitoring() {
            if (!isMonitoring) {
                isMonitoring = true;
                isFreePanning = false;
                hasAutoSetWp = false;
                document.getElementById('recenter-btn').style.display = 'none';
                document.getElementById('monitorBtn').innerText = "🛑 STOP MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff4d4d";
                document.getElementById('new-dashboard').style.display = "flex";
                
                if(isCreatingRoute) toggleRouteCreation(); 
                
                watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
            } else {
                isMonitoring = false;
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('monitorBtn').innerText = "📡 START MONITORING";
                document.getElementById('monitorBtn').style.background = "#ff9f1c";
                document.getElementById('recenter-btn').style.display = 'none';
                document.getElementById('new-dashboard').style.display = "none";
            }
        }

        function autoSetWaypoint(lat, lon) {
            if (waypoints.length < 2) return;
            for (let i = 0; i < waypoints.length - 1; i++) {
                const pPrev = (i === 0) ? [lat, lon] : [waypoints[i-1].lat, waypoints[i-1].lng];
                const pCurr = [waypoints[i].lat, waypoints[i].lng];
                const pNext = [waypoints[i+1].lat, waypoints[i+1].lng];

                const b1 = getBearing(pPrev[0], pPrev[1], pCurr[0], pCurr[1]);
                const b2 = getBearing(pCurr[0], pCurr[1], pNext[0], pNext[1]);
                let bisect = (b1 + b2) / 2 + 90;
                
                const bearingToShip = getBearing(pCurr[0], pCurr[1], lat, lon);
                let diff = Math.abs(((bearingToShip - bisect + 180 + 360) % 360) - 180);

                if (diff <= 90) { 
                    activeWpIndex = i;
                    break;
                }
                activeWpIndex = i + 1;
            }
            updateRouteDisplay();
        }

        function updatePosition(pos) {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const rawSog = (pos.coords.speed * 1.94384) || 0;
            const cog = pos.coords.heading || 0;
            shipPos = [lat, lon];
            speedHistory.push(rawSog);
            if (speedHistory.length > 10) speedHistory.shift();
            lastSog = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
            
            document.getElementById('sog-val').innerText = lastSog.toFixed(1);
            document.getElementById('cog-val').innerText = Math.round(cog).toString().padStart(3, '0');
            document.getElementById('gps-val').innerHTML = formatGpsShort(lat, lon);
            
            updateShipGraphics(lat, lon, cog, lastSog);
            
            if (waypoints.length > 0) {
                if (!hasAutoSetWp) {
                    autoSetWaypoint(lat, lon);
                    hasAutoSetWp = true;
                }
                checkBisectorAuto(lat, lon, cog, lastSog);
                calculateNavData(lat, lon, lastSog);
            }
        }

        function updateShipGraphics(lat, lon, cog, sog) {
            const ringIcon = L.divIcon({
                className: 'ship-ring',
                html: '<div style="width:16px; height:16px; border:3px solid #00FF00; border-radius:50%;"></div>',
                iconSize: [22, 22], iconAnchor: [11, 11]
            });
            if (!shipCircle) {
                shipCircle = L.marker([lat, lon], { draggable: true, icon: ringIcon, zIndexOffset: 1000 }).addTo(map);
                
                shipCircle.on('dragstart', () => { 
                    isFreePanning = true; 
                    document.getElementById('recenter-btn').style.display = 'flex';
                });
                
                // Hiermee sleep je de marker om de OFF-CENTER positie te bepalen
                shipCircle.on('dragend', function(e) {
                    const markerPx = map.latLngToContainerPoint(e.target.getLatLng());
                    const centerPx = map.latLngToContainerPoint(map.getCenter());
                    mapOffset = { x: markerPx.x - centerPx.x, y: markerPx.y - centerPx.y };
                    
                    isFreePanning = false; // Hervat meebewegen met de nieuwe offset
                    document.getElementById('recenter-btn').style.display = 'none';
                    if (shipPos) updateShipGraphics(shipPos[0], shipPos[1], cog, sog); // Snap naar offset
                });
            } else {
                shipCircle.setLatLng([lat, lon]);
            }

            const dist = (sog * (vectorMinutes / 60));
            const dest = calculateDestination(lat, lon, cog, dist);
            if (!vectorLine) vectorLine = L.polyline([[lat, lon], dest], {color: '#00FF00', weight: 4}).addTo(map);
            else vectorLine.setLatLngs([[lat, lon], dest]);

            if (!shipCircle.isPopupOpen()) {
                const latD = Math.floor(Math.abs(lat)), latM = ((Math.abs(lat) - latD) * 60).toFixed(3);
                const lonD = Math.floor(Math.abs(lon)), lonM = ((Math.abs(lon) - lonD) * 60).toFixed(3);
                shipCircle.bindPopup(`<div class="vector-popup"><b>Positie:</b><br>${latD}°${latM}'${lat>=0?'N':'S'}<br>${lonD}°${lonM}'${lon>=0?'E':'W'}<hr>Vector (min): <input type="number" value="${vectorMinutes}" onchange="vectorMinutes=this.value"></div>`, { autoPan: false });
            }

            if (!isFreePanning) {
                if (mapOffset) {
                    const targetPx = map.latLngToContainerPoint([lat, lon]);
                    const newCenterPx = L.point(targetPx.x - mapOffset.x, targetPx.y - mapOffset.y);
                    const newCenterLatLng = map.containerPointToLatLng(newCenterPx);
                    map.setView(newCenterLatLng, map.getZoom(), { animate: false });
                } else {
                    map.panTo([lat, lon], { animate: false });
                }
            }
        }

        // --- BISECTRICE VECTOR DOORKRUISING ---
        function checkBisectorAuto(lat, lon, cog, sog) {
            if (activeWpIndex >= waypoints.length - 1) return;
            const pPrev = (activeWpIndex === 0 && shipPos) ? shipPos : [waypoints[activeWpIndex-1].lat, waypoints[activeWpIndex-1].lng];
            const pCurr = [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng];
            const pNext = [waypoints[activeWpIndex+1].lat, waypoints[activeWpIndex+1].lng];

            const b1 = getBearing(pPrev[0], pPrev[1], pCurr[0], pCurr[1]);
            const b2 = getBearing(pCurr[0], pCurr[1], pNext[0], pNext[1]);
            
            const dist = (sog * (vectorMinutes / 60));
            const dest = calculateDestination(lat, lon, cog, dist); // Vector Tip

            // Functie die berekent of een punt aan de 'volgende' kant van de bisectrice ligt
            const isPast = (p) => {
                let bisect = (b1 + b2) / 2 + 90;
                const bearNext = getBearing(pCurr[0], pCurr[1], pNext[0], pNext[1]);
                const bearP = getBearing(pCurr[0], pCurr[1], p[0], p[1]);
                const normNext = Math.sin((bearNext - bisect) * Math.PI / 180);
                const normP = Math.sin((bearP - bisect) * Math.PI / 180);
                return (normNext * normP) > 0; // True als ze aan dezelfde kant van de lijn liggen
            };

            const distToWp = map.distance([lat, lon], pCurr) / 1852;
            const thresholdDist = Math.max(1.0, dist + 0.5); 
            
            if (distToWp < thresholdDist) {
                if (isPast(dest) || isPast([lat, lon])) {
                    activeWpIndex++;
                    playArrivalBeep();
                    updateRouteDisplay();
                }
            }
        }

        function calculateNavData(lat, lon, sog) {
            if (waypoints.length === 0 || activeWpIndex >= waypoints.length) {
                document.getElementById('dtg-val').innerText = "--.-";
                document.getElementById('ttg-val').innerText = "--:--";
                return;
            }
            
            let dtg = map.distance([lat, lon], [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]) / 1852;
            document.getElementById('dtg-val').innerText = dtg.toFixed(1);

            if (sog > 0.2) {
                const hoursTotal = dtg / sog;
                const h = Math.floor(hoursTotal), m = Math.floor((hoursTotal - h) * 60);
                document.getElementById('ttg-val').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            } else {
                document.getElementById('ttg-val').innerText = "--:--";
            }
        }

        function formatCoords(lat, lon) {
            const latD = Math.floor(Math.abs(lat)), latM = ((Math.abs(lat) - latD) * 60).toFixed(3);
            const lonD = Math.floor(Math.abs(lon)), lonM = ((Math.abs(lon) - lonD) * 60).toFixed(3);
            return `${latD}° ${latM}' ${lat >= 0 ? 'N' : 'S'} <br> ${lonD}° ${lonM}' ${lon >= 0 ? 'E' : 'W'}`;
        }

        function saveRouteToLocal() {
            localStorage.setItem('savedRoute', JSON.stringify({ waypoints, activeWpIndex }));
        }

        function loadRouteFromLocal() {
            try {
                const saved = localStorage.getItem('savedRoute');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    waypoints = parsed.waypoints || [];
                    activeWpIndex = parsed.activeWpIndex || 0;
                    if(waypoints.length > 0) updateRouteDisplay();
                }
            } catch(e) {}
        }

        function updateRouteDisplay() {
            routeLines.forEach(l => map.removeLayer(l)); wpMarkers.forEach(m => map.removeLayer(m));
            routeLines = []; wpMarkers = [];
            
            waypoints.forEach((wp, i) => {
                const isTarget = (i === activeWpIndex);
                const color = (i < activeWpIndex) ? '#555' : (isTarget ? '#ff9f1c' : 'red');
                
                let wpEtaStr = "--:--";
                if (shipPos && lastSog > 0.1) {
                    let d = map.distance(shipPos, [waypoints[activeWpIndex].lat, waypoints[activeWpIndex].lng]);
                    for (let j = activeWpIndex; j < i; j++) d += map.distance([waypoints[j].lat, waypoints[j].lng], [waypoints[j+1].lat, waypoints[j+1].lng]);
                    const hoursWp = (d / 1852) / lastSog;
                    const etaWp = new Date(Date.now() + hoursWp * 3600000);
                    wpEtaStr = etaWp.getHours().toString().padStart(2, '0') + ":" + etaWp.getMinutes().toString().padStart(2, '0');
                }

                const m = L.marker([wp.lat, wp.lng], {
                    draggable: true,
                    icon: L.divIcon({ className: 'wp-icon', html: `<div style="width:12px; height:12px; background:${color}; border:2px solid white; border-radius:50%;"></div>`, iconSize: [16, 16], iconAnchor: [8, 8] })
                }).addTo(map);

                m.on('drag', function(e) {
                    waypoints[i].lat = e.target.getLatLng().lat;
                    waypoints[i].lng = e.target.getLatLng().lng;
                    drawRouteOnly();
                });
                m.on('dragend', updateRouteDisplay);

                m.bindPopup(`
                    <div class="wp-popup">
                        <b>WAYPOINT ${i+1}</b><br>
                        ${formatCoords(wp.lat, wp.lng)}<hr>
                        <small>ETA WP: ${wpEtaStr}</small><br>
                        Notitie:<br><input type="text" value="${wp.note || ''}" onchange="waypoints[${i}].note=this.value">
                        <button class="btn" onclick="setActiveWp(${i})">📍 Activeren</button>
                        <button class="btn btn-danger" onclick="removeWaypoint(${i})">🗑️ Verwijder</button>
                    </div>
                `);
                wpMarkers.push(m);

                if (i > 0 && i < waypoints.length - 1) {
                    const pPrev = [waypoints[i-1].lat, waypoints[i-1].lng];
                    const pCurr = [wp.lat, wp.lng];
                    const pNext = [waypoints[i+1].lat, waypoints[i+1].lng];
                    
                    const b1 = getBearing(pPrev[0], pPrev[1], pCurr[0], pCurr[1]);
                    const b2 = getBearing(pCurr[0], pCurr[1], pNext[0], pNext[1]);
                    let bisect = (b1 + b2) / 2 + 90;

                    const p1 = calculateDestination(wp.lat, wp.lng, bisect, 0.2); 
                    const p2 = calculateDestination(wp.lat, wp.lng, bisect + 180, 0.2);
                    
                    const bisectLine = L.polyline([p1, p2], {color: '#ff9f1c', weight: 2}).addTo(map);
                    routeLines.push(bisectLine);
                }

                if (i < waypoints.length - 1) {
                    const legColor = (i === activeWpIndex - 1) ? '#ff9f1c' : (i < activeWpIndex - 1 ? '#555' : 'red');
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: legColor, weight: 4}).addTo(map);
                    
                    let linePressTimer;
                    l.on('mousedown touchstart', function(e) {
                        clearTimeout(mapPressTimer); 
                        L.DomEvent.stopPropagation(e); 
                        linePressTimer = setTimeout(() => {
                            insertWaypoint(i + 1, e.latlng);
                        }, 1000);
                    });
                    l.on('mouseup touchend mousemove touchmove', function() { clearTimeout(linePressTimer); });
                    
                    routeLines.push(l);
                }
            });
            saveRouteToLocal();
        }

        function drawRouteOnly() {
            routeLines.forEach(l => map.removeLayer(l));
            routeLines = [];
            waypoints.forEach((wp, i) => {
                if (i > 0 && i < waypoints.length - 1) {
                    const pPrev = [waypoints[i-1].lat, waypoints[i-1].lng];
                    const pCurr = [wp.lat, wp.lng];
                    const pNext = [waypoints[i+1].lat, waypoints[i+1].lng];
                    const b1 = getBearing(pPrev[0], pPrev[1], pCurr[0], pCurr[1]);
                    const b2 = getBearing(pCurr[0], pCurr[1], pNext[0], pNext[1]);
                    let bisect = (b1 + b2) / 2 + 90;
                    const p1 = calculateDestination(wp.lat, wp.lng, bisect, 0.2); 
                    const p2 = calculateDestination(wp.lat, wp.lng, bisect + 180, 0.2);
                    const bisectLine = L.polyline([p1, p2], {color: '#ff9f1c', weight: 2}).addTo(map);
                    routeLines.push(bisectLine);
                }

                if (i < waypoints.length - 1) {
                    const legColor = (i === activeWpIndex - 1) ? '#ff9f1c' : (i < activeWpIndex - 1 ? '#555' : 'red');
                    const l = L.polyline([[wp.lat, wp.lng], [waypoints[i+1].lat, waypoints[i+1].lng]], {color: legColor, weight: 4}).addTo(map);
                    routeLines.push(l);
                }
            });
        }

        function insertWaypoint(index, latlng) {
            waypoints.splice(index, 0, {lat: latlng.lat, lng: latlng.lng, note: ""});
            updateRouteDisplay();
        }

        window.setActiveWp = function(i) { activeWpIndex = i; updateRouteDisplay(); map.closePopup(); };
        window.removeWaypoint = function(i) { waypoints.splice(i, 1); if (activeWpIndex >= waypoints.length) activeWpIndex = Math.max(0, waypoints.length - 1); updateRouteDisplay(); map.closePopup(); };

        function calculateDestination(lat, lon, brng, dist) {
            const R = 3440.065; const ad = dist / R;
            const la1 = lat * Math.PI / 180, lo1 = lon * Math.PI / 180, br = brng * Math.PI / 180;
            const la2 = Math.asin(Math.sin(la1) * Math.cos(ad) + Math.cos(la1) * Math.sin(ad) * Math.cos(br));
            const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(ad) * Math.cos(la1), Math.cos(ad) - Math.sin(la1) * Math.sin(la2));
            return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
        }

        function getBearing(la1, lo1, la2, lo2) {
            const y = Math.sin((lo2 - lo1) * Math.PI / 180) * Math.cos(la2 * Math.PI / 180);
            const x = Math.cos(la1 * Math.PI / 180) * Math.sin(la2 * Math.PI / 180) - Math.sin(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.cos((lo2 - lo1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        window.loadRouteRTZ = async function(e) {
            const file = e.target.files[0]; if (!file) return;
            let text = "";
            if (file.name.endsWith('.voy')) {
                const zip = new JSZip(); const c = await zip.loadAsync(file);
                const r = Object.keys(c.files).find(n => n.endsWith('.rtz'));
                text = await c.files[r].async("text");
            } else text = await file.text();
            const parser = new DOMParser(); const xml = parser.parseFromString(text, "text/xml");
            const wps = xml.getElementsByTagName("waypoint");
            waypoints = []; activeWpIndex = 0;
            for (let i = 0; i < wps.length; i++) {
                const pos = wps[i].getElementsByTagName("position")[0];
                waypoints.push({lat: parseFloat(pos.getAttribute("lat")), lng: parseFloat(pos.getAttribute("lon")), note: ""});
            }
            updateRouteDisplay();
        };

        window.nextActiveWP = function() { activeWpIndex = (activeWpIndex + 1) % waypoints.length; updateRouteDisplay(); };
        window.clearRoute = function() { waypoints = []; activeWpIndex = 0; updateRouteDisplay(); };
        
        window.saveRouteRTZ = async function() {
            if(waypoints.length === 0) return;
            let xml = `<?xml version="1.0" encoding="UTF-8"?><route xmlns="http://www.cirm.org/RTZ/1/0"><waypoints>`; 
            waypoints.forEach((wp, i) => { xml += `<waypoint id="${i+1}"><position lat="${wp.lat}" lon="${wp.lng}"/></waypoint>`; }); 
            xml += `</waypoints></route>`; 
            
            const pref = document.getElementById('saveLocationPref').value;
            
            if (pref === 'prompt' && window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'Route.rtz',
                        types: [{ description: 'RTZ Route', accept: {'application/xml': ['.rtz']} }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(xml);
                    await writable.close();
                } catch (e) {
                    console.log('Opslaan geannuleerd', e);
                }
            } else {
                let n = prompt("Naam:", "Route"); if(!n) return;
                let a = document.createElement('a'); 
                a.href = URL.createObjectURL(new Blob([xml], {type: "application/xml"})); 
                a.download = n + ".rtz"; 
                a.click(); 
            }
        };
    </script>
</body>
</html>
